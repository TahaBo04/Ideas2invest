{% extends "base.html" %}
{% block title %}Nouveau post · ideas2invest{% endblock %}

{% block content %}
<div class="section" style="max-width:800px; margin:auto;">
  <h2>Créer un nouveau post</h2>
  <p>Partagez une opportunité, un update, une annonce…</p>

  <form method="POST" class="mt-3">
    <div class="mb-3">
      <label class="form-label">Titre</label>
      <input name="title" class="form-control" maxlength="140" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Contenu</label>
      <textarea name="content" class="form-control" rows="6" required></textarea>
    </div>

    <div class="mb-3">
      <label class="form-label">Visibilité</label>
      <select name="visibility" class="form-select">
        <option value="public">Public</option>
        <option value="verified_only">Uniquement comptes vérifiés</option>
        <option value="investors_only">Investisseurs uniquement</option>
        <option value="innovators_only">Porteurs d’idées uniquement</option>
      </select>
    </div>

    <button class="button" type="submit">Publier</button>
    <a class="button secondary" href="{{ url_for('posts.feed') }}">Annuler</a>
  </form>
</div>
{% endblock %}
